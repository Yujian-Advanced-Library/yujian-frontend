<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遇"荐"</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .login-container {
            background: #fff;
            width: 100%;
            max-width: 400px;
            min-height: 350px;
            padding: 60px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin: auto;/* 使内部元素水平居中 */
            margin-bottom: 180px;
        }
        .login-method {
            margin-bottom: 50px;
        }
        .login-method button {
            padding: 10px 20px;
            margin: 0 5px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background-color: #5a6268;
            color: white;
            transition: background-color 0.3s;
        }
        .login-method button:hover {
            background-color: #e68a00;
        }
        .login-method button.active {
            background-color: #ff9800;
        }
        .login-form {
            display: none;
        }
        .login-form.active {
            display: block;
        }
        .form-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .float-label {
            margin-right: 10px;
            white-space: nowrap;
            width: 70px;
            text-align: right;
        }
        .form-group input {
            flex-grow: 1;
            padding: 10px;
            margin: 0;
            font-size: 14px;
            border: 1px solid #e1e1e1;
            border-radius: 40px;
            box-sizing: border-box;
        }
        .login-action button {
            background-color: #ff9800;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 20px; /* 增加底部间距 */
        }
        .login-action button:hover {
            background-color: #e68a00;
        }
        .remember-password {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 15px;
        }
        .remember-password input[type="checkbox"] {
            margin-right: 5px;
        }
        .footer-links {
            margin-top: 20px; /* 增加顶部间距 */
        }
        .footer-links a {
            color: #007bff;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s;
        }
        .footer-links a:hover {
            color: #0056b3;
        }
        .captcha-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .captcha-button {
            background-color: #ff9800;
            color: white;
            padding: 10px 10px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .captcha-button:hover {
            background-color: #5a6268;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: antiquewhite;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: white;
            padding-left: 5vw;
            height: 12vh;
            position: relative;
        }

        header ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: absolute;
            top: 15%;
            margin-left: 20vw;
            z-index: 100;
        }

        .name {
            position: absolute;
            top: 15%;
        }

        .name h1 {
            font-size: 1.2vw;
            color: black;
        }

        .name h2 {
            font-size: 1vw;
            color: darkgrey;
        }

        li {
            float: left;
        }

        li a {
            display: block;
            color: black;
            text-align: center;
            padding: 2.5vh 2vw;
            text-decoration: none;
        }

        li a:hover {
            background-color: antiquewhite;
        }

        .search-form {
            display: flex;
            align-items: center;
            position: absolute;
            top: 25%;
        }

        .search-input {
            flex: 1;
            border: 0.2vw solid #ccc;
            border-radius: 0.4vw;
            font-size: 1vw;
            background-color: white;
            background-image: url('https://static.jyshare.com/images/mix/searchicon.png');
            background-position: 1.2vh 0.7vw;
            background-repeat: no-repeat;
            padding: 1.5vh 1.5vw 1.5vh 4vw;
            margin-left: 40vw;
        }

        .button {
            display: inline-block;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            outline: none;
            border-radius: 1vw;
            padding: 1.2vh 1vw;
        }

        .button1 {
            font-size: 1vw;
            color: black;
            background-color: white;
            border: 0.2vw solid #ccc;
            box-shadow: 0 0.4vw #999;
        }

        .button1:hover {
            background-color: antiquewhite;
        }

        .button1:active {
            background-color: antiquewhite;
            box-shadow: 0 0.4vw #666;
            transform: translateY(0.4vw);
        }

        .button2 {
            font-size: 1vw;
            width: 6vw;
            transition: all 0.5s;
            margin: 0.4vw;
            color: white;
            border: none;
            float: right;
            position: relative;
            top: 25%;
        }

        .button2 span {
            cursor: pointer;
            display: inline-block;
            position: relative;
            transition: 0.5s;
        }

        .button2 span:after {
            content: '»';
            position: absolute;
            opacity: 0;
            top: 0;
            right: -1.5vw;
            transition: 0.5s;
        }

        .button2:hover span {
            padding-right: 1.5vw;
        }

        .button2:hover span:after {
            opacity: 1;
            right: 0;
        }

        .button3 {
            background-color: darksalmon;
            margin-right: 5vw;
        }

        .button4 {
            background-color: darkorange;
        }

        footer {
            background-color: white;
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 1vh 0;
            display: flex;
            justify-content: center;
        }

        footer ul {
            list-style-type: none;
            margin: auto;
            padding: 0;
            overflow: hidden;
        }</style>
</head>

<body>

<header>
    <div class="name">
        <h1>遇“荐”</h1>
        <h2>图 书 馆 阅 读 互 动 平 台</h2>
    </div>
    <ul>
        <li><a href="#PlatformHomepage">平台首页</a></li>
        <li><a href="#Forum">论坛</a></li>
    </ul>
    <form class="search-form">
        <input class="search-input" type="text" name="search" placeholder="输入关键词搜索...">
        <button class="button button1">Search</button>
    </form>
    <button class="button button2 button3"><span>注册</span></button>
    <button class="button button2 button4"><span>登录</span></button>
</header>
<p>
<div class="login-container">
    <div class="login-method">
        <button class="active" onclick="switchLoginType('account')">账号登录</button>
        <button onclick="switchLoginType('captcha')">验证码登录</button>
    </div>
    <form id="account-login" class="login-form active">
        <div class="form-group">
            <label for="account" class="float-label">账号:</label>
            <input type="text" id="account" required>
        </div>
        <div class="form-group">
            <label for="password" class="float-label">密码:</label>
            <input type="password" id="password" required>
        </div>
        <div class="login-action">
            <button type="submit">立即登录</button>
        </div>
        <div class="remember-password">
            <input type="checkbox" id="remember-me">
            <label for="remember-me">记住密码</label>
        </div>
    </form>
    <form id="captcha-login" class="login-form">
        <div class="form-group">
            <label for="phone" class="float-label">手机号:</label>
            <input type="text" id="phone" required>
        </div>
        <div class="form-group captcha-group">
            <label for="captcha" class="float-label">验证码:</label>
            <input type="text" id="captcha" required>
            <button type="button" class="captcha-button" onclick="getCaptcha()">获取短信验证码</button>
        </div>
        <div class="login-action">
            <button type="submit">立即登录</button>
        </div>
    </form>
    <div class="footer-links">
        <a href="#">没有账号？去注册</a>
        <a href="#">忘记密码？</a>
    </div>
</div>
</p>
<footer>
    <ul>
        <li><a href="#AboutUs">关于我们</a></li>
        <li><a href="#ContactUs">联系我们</a></li>
        <li><a href="#HelpCenter">帮助中心</a></li>
        <li><a href="#PrivacyPolicy">隐私条款</a></li>
        <li><a href="#UserAgreement">用户协议</a></li>
        <li><a href="#MerchantCooperation">商家合作</a></li>
    </ul>
</footer>
<script>
    function switchLoginType(type) {
        document.querySelectorAll('.login-form').forEach(form => {
            form.classList.remove('active');
        });
        document.querySelectorAll('.login-method button').forEach(button => {
            button.classList.remove('active');
        });
        document.getElementById(type + '-login').classList.add('active');
        document.querySelector('.login-method button:nth-child(' + (type === 'account' ? '1' : '2') + ')').classList.add('active');
    }

    function getCaptcha() {
        alert('获取验证码功能尚未实现。');
    }
</script>
</body>

</html>
